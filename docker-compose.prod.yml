services:
  postgres_db:
    image: postgres:17
    restart: always
    env_file:
      - .env.prod
    volumes:
      - task_app_postgres_prod:/var/lib/postgresql/18/docker

  backend:
    build:
      target: prod
    env_file:
      - backend/.env.prod
    ports:
      - "8000:8000"

  frontend:
    build:
      target: prod
    env_file:
      - frontend/.env.production
    ports:
      - "3000:3000"
volumes:
  task_app_postgres_prod:
