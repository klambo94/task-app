services:
  backend:
    env_file:
      - backend/.env.dev
    build:
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # hot reload — mounts local code into container

  frontend:
    build:
      target: dev
    env_file:
      - frontend/.env.development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app  # hot reload

volumes:
  task_app_postgres_dev: